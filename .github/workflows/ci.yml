name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Validate package manifest
        run: swift package dump-package
      - name: Build
        run: swift build
      - name: Test
        run: swift test
