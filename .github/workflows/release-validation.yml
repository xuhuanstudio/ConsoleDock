name: Release Validation

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  validate-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Validate release tag and changelog
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re
          import sys

          if os.environ.get("GITHUB_REF_TYPE") != "tag":
              print("Manual release validation run; skipping tag-specific checks.")
              sys.exit(0)

          tag = os.environ["GITHUB_REF_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?", tag):
              print(f"error: release tag must use semantic version form like v0.1.0, got {tag}", file=sys.stderr)
              sys.exit(1)

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          heading = re.compile(rf"^## \[?{re.escape(tag)}\]?(?:\s|-|$)", re.MULTILINE)
          if heading.search(changelog) is None:
              print(f"error: CHANGELOG.md must contain a release heading for {tag}", file=sys.stderr)
              sys.exit(1)
          PY
      - name: Validate package manifest
        run: swift package dump-package
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Test Release safety defaults
        run: swift test -c release --filter ConsoleDockCoreTests/testReleaseBuild
      - name: Test Release explicit opt-in gate
        run: swift test -c release -Xcc -DCONSOLEDOCK_ENABLE_RELEASE -Xswiftc -DCONSOLEDOCK_ENABLE_RELEASE --filter ConsoleDockCoreTests/testReleaseBuild
      - name: Validate documentation links
        run: python3 scripts/validate-doc-links.py
      - name: Build DocC documentation
        run: scripts/validate-docc.sh
      - name: Build package for iOS Simulator
        run: xcodebuild -scheme ConsoleDock-Package -destination 'generic/platform=iOS Simulator' build
      - name: Build Swift sample app
        run: |
          xcodebuild -project Examples/SwiftSampleApp/SwiftSampleApp.xcodeproj \
            -scheme SwiftSampleApp \
            -destination 'generic/platform=iOS Simulator' \
            build
      - name: Build Objective-C sample app
        run: |
          xcodebuild -project Examples/ObjCSampleApp/ObjCSampleApp.xcodeproj \
            -scheme ObjCSampleApp \
            -destination 'generic/platform=iOS Simulator' \
            build
      - name: Validate source archive
        run: |
          swift package archive-source --output .build/ConsoleDock-source.zip
          test -s .build/ConsoleDock-source.zip
