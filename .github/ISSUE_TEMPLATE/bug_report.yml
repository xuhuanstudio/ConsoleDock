name: Bug report
description: Report a reproducible ConsoleDock issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, tokens, credentials, or production logs.
        If this is a vulnerability or sensitive-data exposure report, follow SECURITY.md instead of filing public details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ConsoleDock version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Xcode, Swift, and platform
      placeholder: "Xcode 16.x, Swift 6.x, iOS Simulator or device"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core capture
        - Swift API
        - Objective-C API
        - UIKit console
        - Redaction and privacy
        - Release safety
        - Sample app
        - Documentation
        - Packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and Release-build check
      description: Does this involve sensitive log content, redaction, export/share behavior, or Release-build activation?
    validations:
      required: true
